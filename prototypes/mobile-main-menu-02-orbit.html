<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lovnge — Mobile menu #2 Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --gold: #d4af37;
      --text: #fff;
      --muted: #7a7a7a;
      --font-d: "Unbounded", sans-serif;
      --font-b: "Inter", system-ui, sans-serif;
      --ease: cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 120px;
    }
    .grain {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.035;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .content {
      position: relative;
      z-index: 2;
      padding: calc(20px + env(safe-area-inset-top)) 24px 40px;
      max-width: 440px;
      margin: 0 auto;
    }
    .content h1 {
      font-family: var(--font-d);
      font-size: clamp(1.75rem, 8vw, 2.25rem);
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.03em;
    }
    .content p { color: var(--muted); line-height: 1.65; font-size: 14px; }

    /* Dim layer */
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      z-index: 50;
    }
    body.orbit-open .scrim {
      opacity: 1;
      pointer-events: auto;
    }

    /* Orbit dock */
    .orbit-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 60;
      padding: 16px 24px calc(20px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .orbit-dock * { pointer-events: auto; }

    .orbit-fan {
      position: relative;
      width: min(100vw, 400px);
      height: 200px;
      margin-bottom: -24px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    .orbit-item {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 120px;
      margin-left: -60px;
      transform-origin: 50% 100%;
      transform: rotate(0deg) translateY(20px);
      opacity: 0;
      transition: transform 0.5s var(--ease), opacity 0.35s ease;
    }
    body.orbit-open .orbit-item {
      opacity: 1;
    }
    /* fan angles */
    body.orbit-open .orbit-item:nth-child(1) { transform: rotate(-56deg) translateY(-118px); transition-delay: 0.05s; }
    body.orbit-open .orbit-item:nth-child(2) { transform: rotate(-28deg) translateY(-132px); transition-delay: 0.1s; }
    body.orbit-open .orbit-item:nth-child(3) { transform: rotate(0deg) translateY(-138px); transition-delay: 0.15s; }
    body.orbit-open .orbit-item:nth-child(4) { transform: rotate(28deg) translateY(-132px); transition-delay: 0.2s; }
    body.orbit-open .orbit-item:nth-child(5) { transform: rotate(56deg) translateY(-118px); transition-delay: 0.25s; }

    .orbit-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text);
    }
    .orbit-link:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; border-radius: 4px; }
    .orbit-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid #333;
      background: linear-gradient(145deg, var(--surface), #111);
      display: grid;
      place-items: center;
      font-family: var(--font-d);
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: border-color 0.25s, transform 0.25s var(--ease);
    }
    .orbit-link:active .orbit-icon { transform: scale(0.94); }
    .orbit-link:hover .orbit-icon { border-color: var(--gold); }
    .orbit-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      max-width: 72px;
      text-align: center;
      line-height: 1.2;
    }

    .hub-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: radial-gradient(circle at 30% 30%, #3a3420, var(--bg));
      color: var(--gold);
      font-family: var(--font-d);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.2;
      padding: 8px;
      box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.35);
      transition: box-shadow 0.4s ease, transform 0.25s var(--ease);
    }
    .hub-btn:hover { box-shadow: 0 0 40px rgba(212, 175, 55, 0.2); }
    .hub-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }
    body.orbit-open .hub-btn {
      transform: scale(0.92);
      border-color: #666;
      color: #aaa;
    }

    @media (prefers-reduced-motion: reduce) {
      .orbit-item, .scrim, .hub-btn { transition: none !important; }
      body.orbit-open .orbit-item {
        opacity: 1;
        transform: none;
        position: static;
        margin: 8px 0;
      }
      .orbit-fan {
        height: auto;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="scrim" id="scrim" role="presentation"></div>

  <main class="content">
    <h1>Орбитальное меню</h1>
    <p>Нижний хаб — как штурвал: пять направлений веером. Нажми «Меню», затем иконку. Скрим закрывает меню.</p>
  </main>

  <div class="orbit-dock">
    <div class="orbit-fan" id="fan" aria-hidden="true">
      <div class="orbit-item"><a class="orbit-link" href="#"><span class="orbit-icon">01</span><span class="orbit-label">Главная</span></a></div>
      <div class="orbit-item"><a class="orbit-link" href="#"><span class="orbit-icon">02</span><span class="orbit-label">Модели</span></a></div>
      <div class="orbit-item"><a class="orbit-link" href="#"><span class="orbit-icon">03</span><span class="orbit-label">Бронь</span></a></div>
      <div class="orbit-item"><a class="orbit-link" href="#"><span class="orbit-icon">04</span><span class="orbit-label">Условия</span></a></div>
      <div class="orbit-item"><a class="orbit-link" href="#"><span class="orbit-icon">05</span><span class="orbit-label">Вход</span></a></div>
    </div>
    <button type="button" class="hub-btn" id="hub" aria-expanded="false" aria-controls="fan">Меню</button>
  </div>

  <script>
    const body = document.body;
    const hub = document.getElementById("hub");
    const scrim = document.getElementById("scrim");
    function toggle() {
      const open = body.classList.toggle("orbit-open");
      hub.setAttribute("aria-expanded", open);
    }
    hub.addEventListener("click", (e) => { e.stopPropagation(); toggle(); });
    scrim.addEventListener("click", () => {
      body.classList.remove("orbit-open");
      hub.setAttribute("aria-expanded", "false");
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        body.classList.remove("orbit-open");
        hub.setAttribute("aria-expanded", "false");
      }
    });
  </script>
</body>
</html>
