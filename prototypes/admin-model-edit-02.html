<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lovnge Admin — редактирование модели #2 Превью телефон + форма</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --elev: #242424;
      --border: #2a2a2a;
      --text: #fff;
      --muted: #a0a0a0;
      --faint: #666;
      --gold: #d4af37;
      --font-d: "Unbounded", sans-serif;
      --font-b: "Inter", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--bg); color: var(--text); }
    .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 24px; }
    .bar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .bar a { color: var(--muted); text-decoration: none; font-size: 13px; }
    .bar strong { font-family: var(--font-d); font-size: 13px; }
    .preview-block { padding: 20px 16px; background: #060606; border-bottom: 1px solid var(--border); }
    .hint-preview { font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
    .phone {
      margin: 0 auto;
      width: 220px;
      border-radius: 28px;
      border: 3px solid #333;
      background: #000;
      padding: 10px 10px 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .phone-notch {
      width: 80px; height: 22px; background: #111; border-radius: 0 0 12px 12px;
      margin: 0 auto 10px;
    }
    .phone-screen {
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface);
      min-height: 380px;
    }
    .phone-hero { height: 200px; background: linear-gradient(145deg,#3a322a,#121212); }
    .phone-body { padding: 14px; }
    .phone-body h3 { font-family: var(--font-d); font-size: 15px; margin-bottom: 6px; }
    .phone-body p { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .phone-chip { margin-top: 10px; font-size: 10px; color: var(--gold); }
    .form { padding: 20px 16px; }
    .form h2 {
      font-family: var(--font-d);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    input, textarea {
      width: 100%; padding: 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--elev);
      color: var(--text); margin-bottom: 14px; font-family: inherit; font-size: 14px;
    }
    textarea { min-height: 80px; }
    .actions { display: flex; gap: 10px; margin-top: 8px; }
    .actions button {
      flex: 1;
      padding: 14px;
      font-family: var(--font-d);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    .actions .ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .actions .go { background: var(--gold); color: #0a0a0a; }
    .foot { text-align: center; font-size: 10px; color: var(--faint); padding: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <a href="#">← Назад</a>
      <strong>Предпросмотр</strong>
      <a href="#" style="color:var(--gold)">Фото</a>
    </div>
    <div class="preview-block">
      <p class="hint-preview">Как в приложении (живое обновление)</p>
      <div class="phone" aria-hidden="true">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="phone-hero"></div>
          <div class="phone-body">
            <h3 id="pvName">София Лорен</h3>
            <p id="pvBio">Кино, вино и спокойные вечера.</p>
            <p class="phone-chip">Elite · Москва</p>
          </div>
        </div>
      </div>
    </div>
    <div class="form">
      <h2>Быстрые поля</h2>
      <label for="name">Имя</label>
      <input id="name" value="София Лорен" />
      <label for="bio">Био (2 строки)</label>
      <textarea id="bio">Кино, вино и спокойные вечера.</textarea>
      <div class="actions">
        <button type="button" class="ghost">Отмена</button>
        <button type="button" class="go">Применить</button>
      </div>
    </div>
    <p class="foot">Админ-прототип #2 — мокап устройства + синхрон поля</p>
  </div>
  <script>
    var n = document.getElementById('name'), b = document.getElementById('bio');
    n.addEventListener('input', function() { document.getElementById('pvName').textContent = n.value || '—'; });
    b.addEventListener('input', function() { document.getElementById('pvBio').textContent = b.value || '—'; });
  </script>
</body>
</html>
