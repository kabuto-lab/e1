<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блок-схема</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .diagram {
            position: relative;
            width: 800px;
            height: 600px;
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .box {
            position: absolute;
            border: 3px solid #333;
            border-radius: 20px;
            padding: 15px 20px;
            background: #fff;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            z-index: 2;
        }
        
        .admin-agent {
            top: 50px;
            left: 50px;
            width: 140px;
        }
        
        .client {
            top: 180px;
            left: 50px;
            width: 120px;
        }
        
        .edit-view {
            top: 120px;
            left: 280px;
            width: 120px;
        }
        
        .public-profile {
            top: 280px;
            left: 250px;
            width: 200px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .public-profile .title {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .public-profile .main {
            font-size: 24px;
        }
        
        .gallery {
            top: 300px;
            right: 80px;
            width: 140px;
        }
        
        .circles {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        
        .circle {
            width: 30px;
            height: 30px;
            border: 2px solid #333;
            border-radius: 50%;
            margin: 0 auto;
        }
        
        .arrow {
            position: absolute;
            background: #333;
            z-index: 1;
        }
        
        .arrow-h {
            height: 3px;
            width: 80px;
        }
        
        .arrow-v {
            width: 3px;
            height: 60px;
        }
        
        .arrow-curved {
            width: 3px;
            height: 80px;
            border-radius: 3px;
        }
        
        .line {
            position: absolute;
            border: 2px solid #333;
            z-index: 1;
        }
        
        .line-1 {
            top: 110px;
            left: 195px;
            width: 90px;
            height: 3px;
            border-radius: 20px 0 0 20px;
        }
        
        .line-2 {
            top: 110px;
            left: 193px;
            width: 3px;
            height: 30px;
        }
        
        .line-3 {
            top: 210px;
            left: 175px;
            width: 110px;
            height: 3px;
        }
        
        .line-4 {
            top: 210px;
            left: 340px;
            width: 3px;
            height: 70px;
        }
        
        .arrow-down {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #333;
            z-index: 2;
        }
        
        .info {
            position: absolute;
            top: 420px;
            left: 320px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .corner-1 {
            position: absolute;
            top: 250px;
            left: 220px;
            width: 20px;
            height: 20px;
            border-left: 4px solid #333;
            border-bottom: 4px solid #333;
        }
        
        .corner-2 {
            position: absolute;
            top: 250px;
            right: 200px;
            width: 20px;
            height: 20px;
            border-right: 4px solid #333;
            border-bottom: 4px solid #333;
        }
        
        .corner-3 {
            position: absolute;
            bottom: 100px;
            left: 220px;
            width: 20px;
            height: 20px;
            border-left: 4px solid #333;
            border-top: 4px solid #333;
        }
        
        .corner-4 {
            position: absolute;
            bottom: 100px;
            right: 200px;
            width: 20px;
            height: 20px;
            border-right: 4px solid #333;
            border-top: 4px solid #333;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <!-- АДМИН АГЕНТ -->
        <div class="box admin-agent">
            АДМИН<br>АГЕНТ
        </div>
        
        <!-- Линия от АДМИН АГЕНТ к EDIT VIEW -->
        <div class="line line-1"></div>
        <div class="line line-2"></div>
        
        <!-- EDIT VIEW -->
        <div class="box edit-view">
            EDIT<br>VIEW
        </div>
        
        <!-- КЛИЕНТ -->
        <div class="box client">
            КЛИЕНТ
        </div>
        
        <!-- Линия от КЛИЕНТ к EDIT VIEW -->
        <div class="line line-3"></div>
        
        <!-- Линия вниз к ПРОФИЛЮ -->
        <div class="line line-4"></div>
        
        <!-- Стрелка вниз -->
        <div class="arrow-down" style="top: 275px; left: 336px;"></div>
        
        <!-- ПУБЛИЧНЫЙ ПРОФИЛЬ -->
        <div class="box public-profile">
            <div class="title">ПУБЛИЧНЫЙ</div>
            <div class="main">ПРОФИЛЬ</div>
        </div>
        
        <!-- Угловые скобки -->
        <div class="corner-1"></div>
        <div class="corner-2"></div>
        <div class="corner-3"></div>
        <div class="corner-4"></div>
        
        <!-- ИНФО -->
        <div class="info">ИНФО</div>
        
        <!-- ФОТО ГАЛЕРЕЯ -->
        <div class="box gallery">
            <div class="circles">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
            <div>ФОТО<br>ГАЛЕРЕЯ</div>
        </div>
    </div>
</body>
</html>
