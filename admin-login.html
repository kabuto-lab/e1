<!-- ADMIN LOGIN PAGE | Lovnge Platform -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход администратора | Lovnge Platform</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0a0a; 
      min-height: 100vh; 
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1, h2, h3 { font-family: 'Unbounded', sans-serif; }
    
    /* Login Container */
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: rgba(26, 26, 26, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .logo p {
      color: #6b6b6b;
      font-size: 14px;
      margin-top: 8px;
    }
    
    /* Form */
    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #a0a0a0;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: rgba(212, 175, 55, 0.5);
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    .form-group input::placeholder { color: #555; }
    
    /* Error Message */
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ef4444;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .error-message.show { display: block; }
    
    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #d4af37, #b8941f);
      border: none;
      border-radius: 10px;
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }
    .submit-btn:active { transform: translateY(0); }
    
    /* Back Link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #8b8b8b;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #d4af37; }
    
    /* Security Notice */
    .security-notice {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
      font-size: 12px;
      color: #555;
    }
    .security-notice svg {
      width: 16px;
      height: 16px;
      vertical-align: middle;
      margin-right: 6px;
    }
    
    @media (max-width: 480px) {
      .login-container { margin: 20px; padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>Lov<span>nge</span></h1>
      <p>Панель администратора</p>
    </div>
    
    <div class="error-message" id="error-message">
      ❌ Неверный логин или пароль
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Логин</label>
        <input 
          type="text" 
          id="username" 
          placeholder="Введите логин" 
          autocomplete="username"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="password">Пароль</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Введите пароль" 
          autocomplete="current-password"
          required
        >
      </div>
      
      <button type="submit" class="submit-btn">Войти</button>
    </form>
    
    <a href="index.html" class="back-link">← Вернуться на сайт</a>
    
    <div class="security-notice">
      🔒 Защищённое соединение
    </div>
  </div>

  <script>
    // ============================================
    // JWT AUTHENTICATION (Production Ready)
    // ============================================
    const API_URL = 'http://localhost:3000';
    
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        // Call API login endpoint
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ 
            email: username, 
            password: password 
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        // Check if user is admin
        if (data.user.role !== 'admin') {
          throw new Error('Access denied. Admin role required.');
        }

        // Success - save JWT tokens and redirect
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect to dashboard
        window.location.href = 'admin-dashboard.html';
        
      } catch (error) {
        // Error - show message
        errorMessage.textContent = '❌ ' + error.message;
        errorMessage.classList.add('show');

        // Shake animation
        form.style.animation = 'shake 0.5s';
        setTimeout(() => { form.style.animation = ''; }, 500);

        // Clear password
        document.getElementById('password').value = '';
      }
    });

    // Add shake animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-10px); }
        40%, 80% { transform: translateX(10px); }
      }
    `;
    document.head.appendChild(style);

    // Check if already logged in with JWT
    const token = localStorage.getItem('accessToken');
    const userStr = localStorage.getItem('user');
    if (token && userStr) {
      try {
        const user = JSON.parse(userStr);
        if (user.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        }
      } catch (e) {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('user');
      }
    }
  </script>
</body>
</html>
