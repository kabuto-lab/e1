# This file is NOT auto-generated.

name: WASM Checks
on:
  workflow_dispatch:
    inputs:
      clean_build_required:
        description: Clean before and after the run.
        required: false
        type: boolean
        default: false
  workflow_call: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-wasm-checks
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}
jobs:
  enso-build-ci-gen-job-native-test-linux-amd64:
    name: Native Rust tests (linux, amd64)
    runs-on:
      - self-hosted
      - Linux
    steps:
      - name: Setup bazel environment
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.x
          bazelrc: build --remote_cache=grpcs://${{ vars.ENSO_BAZEL_CACHE_URI }} --remote_cache_header="authorization=Basic ${{ secrets.ENSO_BAZEL_CACHE_TOKEN }}"
          output-base: ${{ runner.os == 'Windows' && 'c:/_bazel' || '' }}
      - name: Checking out the repository
        uses: actions/checkout@v4
        with:
          clean: false
      - if: "${{ (contains(github.event.pull_request.labels.*.name, 'CI: Clean build required') || (github.ref == 'refs/heads/develop') || inputs.clean_build_required) }}"
        name: Clean before
        run: corepack pnpm run git-clean --verbose --clean-bazel
      - run: cargo test --workspace
      - if: "${{ (contains(github.event.pull_request.labels.*.name, 'CI: Clean build required') || (github.ref == 'refs/heads/develop') || inputs.clean_build_required) }}"
        name: Clean after
        run: corepack pnpm run git-clean --verbose --clean-bazel
  enso-build-ci-gen-job-wasm-lint-linux-amd64:
    name: Lint (linux, amd64)
    runs-on:
      - self-hosted
      - Linux
    steps:
      - name: Setup bazel environment
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.x
          bazelrc: build --remote_cache=grpcs://${{ vars.ENSO_BAZEL_CACHE_URI }} --remote_cache_header="authorization=Basic ${{ secrets.ENSO_BAZEL_CACHE_TOKEN }}"
          output-base: ${{ runner.os == 'Windows' && 'c:/_bazel' || '' }}
      - name: Checking out the repository
        uses: actions/checkout@v4
        with:
          clean: false
      - if: "${{ (contains(github.event.pull_request.labels.*.name, 'CI: Clean build required') || (github.ref == 'refs/heads/develop') || inputs.clean_build_required) }}"
        name: Clean before
        run: corepack pnpm run git-clean --verbose --clean-bazel
      - run: cargo fmt -- --check
      - if: "${{ (contains(github.event.pull_request.labels.*.name, 'CI: Clean build required') || (github.ref == 'refs/heads/develop') || inputs.clean_build_required) }}"
        name: Clean after
        run: corepack pnpm run git-clean --verbose --clean-bazel
  enso-build-ci-gen-job-parser-wasm-test-linux-amd64:
    name: Parser recursion test (linux, amd64)
    runs-on:
      - self-hosted
      - Linux
    steps:
      - name: Setup bazel environment
        uses: bazel-contrib/setup-bazel@0.13.0
        with:
          bazelisk-version: 1.x
          bazelrc: build --remote_cache=grpcs://${{ vars.ENSO_BAZEL_CACHE_URI }} --remote_cache_header="authorization=Basic ${{ secrets.ENSO_BAZEL_CACHE_TOKEN }}"
          output-base: ${{ runner.os == 'Windows' && 'c:/_bazel' || '' }}
      - name: Checking out the repository
        uses: actions/checkout@v4
        with:
          clean: false
      - if: "${{ (contains(github.event.pull_request.labels.*.name, 'CI: Clean build required') || (github.ref == 'refs/heads/develop') || inputs.clean_build_required) }}"
        name: Clean before
        run: corepack pnpm run git-clean --verbose --clean-bazel
      - name: Installing wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.12.1
      - run: WASM_BINDGEN_TEST_TIMEOUT=300 wasm-pack test --headless --firefox lib/rust/parser
      - if: "${{ (contains(github.event.pull_request.labels.*.name, 'CI: Clean build required') || (github.ref == 'refs/heads/develop') || inputs.clean_build_required) }}"
        name: Clean after
        run: corepack pnpm run git-clean --verbose --clean-bazel
