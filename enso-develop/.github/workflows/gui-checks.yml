# This file is not auto-generated. Feel free to edit it.

name: GUI Checks
on: workflow_call

# Cancel in-progress workflows if a new one is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-gui-checks
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

permissions:
  contents: read # Read-only access to repository contents
  issues: write # Write access to issues
  pull-requests: write # Write access to pull requests
  statuses: write # Write access to commit statuses
  checks: write
  id-token: write
  pages: write

env:
  # Workaround for https://github.com/nodejs/corepack/issues/612
  # See: https://github.com/nodejs/corepack/blob/main/README.md#environment-variables
  COREPACK_DEFAULT_TO_LATEST: 0

jobs:
  lint:
    name: 👮 Lint GUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        name: ⎔ Setup Node
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          bazelrc: build --remote_cache=grpcs://${{ vars.ENSO_BAZEL_CACHE_URI }} --remote_cache_header="authorization=Basic ${{ secrets.ENSO_BAZEL_CACHE_TOKEN }}"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/cache/restore@v4
        if: "${{ !(contains(github.event.pull_request.labels.*.name, 'CI: Clean build required')) }}"
        name: Download cache
        id: cache
        with:
          path: |
            **/.eslintcache
            **/node_modules/.vite
          key: ${{ runner.os }}-gui-lint-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gui-lint

      # Next Tasks are depend on Typecheck, because we build libraries at this stage
      - name: ⚙️ Compile
        id: compile
        continue-on-error: true
        run: pnpm run compile

      - name: 🧠 Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm run ci:typecheck

      - name: 🧹 Lint
        id: lint
        continue-on-error: true
        run: pnpm run ci:lint

      - name: 📝 Annotate Code Linting Results
        if: always()
        id: eslint-annotate
        continue-on-error: true
        uses: enso-org/eslint-annotate-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          report-json: "./app/*/eslint_report.json"
          markdown-report-on-step-summary: true
          check-name: 🧹 GUI Lint Results
          only-pr-files: false
          fail-on-error: false
          fail-on-warning: false

      - name: 📥 Download Enso Engine
        continue-on-error: true
        working-directory: app/project-manager-shim
        run: pnpm run download-engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧪 Unit Tests
        id: unit-tests
        continue-on-error: true
        run: pnpm run ci:unit-test

      - name: ❌ Fail if any check failed
        if: always() && (steps.lint.outcome == 'failure' || steps.compile.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.unit-tests.outcome == 'failure')
        run: |
          echo "Lint outcome: ${{ steps.lint.outcome }}"
          echo "Compile outcome: ${{ steps.compile.outcome }}"
          echo "Typecheck outcome: ${{ steps.typecheck.outcome }}"
          echo "Unit tests outcome: ${{ steps.unit-tests.outcome }}"
          exit 1

      - name: 💾 Save cache
        uses: actions/cache/save@v4
        if: always() && steps.cache.outputs.cache-hit != 'true'
        id: save-cache
        with:
          key: ${{ steps.cache.outputs.cache-primary-key }}
          path: |
            **/.eslintcache
            **/node_modules/.vite

  playwright:
    name: 🎭 Playwright Tests
    env:
      NODE_OPTIONS: --disable-warning=ExperimentalWarning
    runs-on:
      - self-hosted
      - Linux
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 24
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        name: ⎔ Setup Node
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelrc: build --remote_cache=grpcs://${{ vars.ENSO_BAZEL_CACHE_URI }} --remote_cache_header="authorization=Basic ${{ secrets.ENSO_BAZEL_CACHE_TOKEN }}"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📺 Install Playwright Browsers
        working-directory: app/gui
        run: pnpm run playwright:install

      - name: ⚙️ Compile
        id: compile
        run: pnpm run compile

      - name: 🎭 Playwright Tests
        working-directory: app/gui
        run: pnpm run test:integration --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: ⬆️ Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: app/gui/blob-report
          retention-days: 7

  merge-reports:
    name: 🔗 Merge Playwright Reports
    if: ${{ !cancelled() }}
    needs: [playwright]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 📥 Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v4
        with:
          path: app/gui/blob-report/
          pattern: blob-report-*
          merge-multiple: true

      - name: 🔗 Merge into HTML Report
        id: merge-reports
        working-directory: app/gui
        run: PLAYWRIGHT_JSON_OUTPUT_FILE=${{ github.workspace }}/app/gui/playwright-report/report.json pnpm playwright merge-reports --reporter=html,github,json ./blob-report

      - name: ⬆️ Upload HTML report
        id: upload-html-report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_attempt }}-${{ github.run_id }}
          path: app/gui/playwright-report/
          retention-days: 14
