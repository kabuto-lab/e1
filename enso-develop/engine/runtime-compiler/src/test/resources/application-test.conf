# Enabling a single logger to more verbose level, for example with
# `logger { org.enso.compiler.pass.lint.UnusedImports = trace }`
# will only print logs from the memory appender in case of test failure.
# To send logs to the console, change `default-appender` to `console`.
logging-service {
  logger {
  }
  appenders = [
    {
      name = "memory"
    },
    {
      name = "console"
      pattern = "[%level] [%d{yyyy-MM-ddTHH:mm:ssXXX}] [%logger] %msg%n"
    }
  ]
  default-appender = memory
  log-level = "warn"
}
