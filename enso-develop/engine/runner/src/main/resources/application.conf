# CLI's application.conf

logging-service {
  logger {
    akka.actor = info
    akka.event = error
    akka.io = error
    akka.stream = error
    org.apache.poi.openxml4j.opc = warn
    org.apache.poi.POIDocument = error
    Standard.Base.Logging.Progress = error
  }
  appenders = [
      {
        name = "file",
        pattern = "[%level{lowercase=true}] [%d{yyyy-MM-dd'T'HH:mm:ssXXX}] [%logger] %msg%n",
        append = false,
        rolling-policy {
          max-file-size = "20MB"
          max-history = 50
          max-total-size = "1GB"
        }
      },
      {
        name = "console"
        pattern = "[%level{lowercase=true}] [%d{yyyy-MM-dd'T'HH:mm:ssXXX}] [%logger] %msg%n"
      }
  ]
  default-appender = console
  default-appender = ${?ENSO_APPENDER_DEFAULT}
  log-to-file {
    enable = true
    enable = ${?ENSO_LOG_TO_FILE}
    log-level = debug
    log-level = ${?ENSO_LOG_TO_FILE_LOG_LEVEL}
  }
}
