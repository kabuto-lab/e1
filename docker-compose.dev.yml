# Явное имя проекта в Docker Desktop (вместо короткого «es» от папки ES)
name: escort-dev

services:
  # PostgreSQL 16
  # ВНИМАНИЕ: POSTGRES_PASSWORD применяется только при ПЕРВОМ создании тома postgres_data.
  # Если пароль в compose поменяли, а том старый — внутри БД останется СТАРЫЙ пароль →
  # «password authentication failed», пока не сделаете ALTER USER … PASSWORD (как в URL)
  # или не пересоздадите том (потеря данных без бэкапа).
  # DATABASE_URL в .env API должен совпадать с реальным паролем роли, а не только с env в compose.
  postgres:
    image: postgres:16-alpine
    container_name: escort-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: companion_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: escort-redis
    command: redis-server
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3 storage)
  minio:
    image: minio/minio:latest
    container_name: escort-minio
    environment:
      MINIO_ROOT_USER: companion_minio_admin
      MINIO_ROOT_PASSWORD: companion_minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console

  # Auto-create MinIO bucket on startup
  minio-init:
    image: minio/minio:latest
    container_name: escort-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 companion_minio_admin companion_minio_password;
      mc mb local/escort-media --ignore-existing;
      mc anonymous set download local/escort-media;
      printf '%s\n' '[{"AllowedOrigins":["*"],"AllowedMethods":["GET","PUT","POST","DELETE","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag"]}]' > /tmp/minio-cors.json;
      mc cors set local/escort-media /tmp/minio-cors.json || true;
      echo 'MinIO bucket ready';
      "
    restart: "no"

  # Mailhog (тестирование email)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: escort-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
