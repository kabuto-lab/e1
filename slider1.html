<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morph Slider with Displacement</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    .slider-wrap {
      position: relative;
      width: 90vmin;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.25); }
    .progress {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.1);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
  <div class="slider-wrap">
    <canvas id="morphCanvas"></canvas>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="controls">
      <button class="btn" id="prevBtn">◀ Prev</button>
      <button class="btn" id="nextBtn">Next ▶</button>
      <button class="btn" id="toggleBtn">⏸ Pause</button>
    </div>
  </div>

  <script>
    // ========== VERTEX SHADER ==========
    const vsSource = `
      attribute vec2 a_position;
      varying vec2 v_uv;
      void main() {
        v_uv = a_position * 0.5 + 0.5;
        gl_Position = vec4(a_position, 0.0, 1.0);
      }
    `;

    // ========== FRAGMENT SHADER с дисплейсментом ==========
    const fsSource = `
      precision highp float;
      varying vec2 v_uv;
      uniform sampler2D u_img1;
      uniform sampler2D u_img2;
      uniform sampler2D u_noise;
      uniform float u_progress;
      uniform float u_time;
      uniform vec2 u_resolution;

      // Simplex noise (упрощённый)
      vec3 mod289(vec3 x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
      vec2 mod289(vec2 x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
      vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
      float snoise(vec2 v){
        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
        vec2 i  = floor(v + dot(v, C.yy));
        vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
        vec4 x12 = x0.xyxy + C.xxzz;
        x12.xy -= i1;
        i = mod289(i);
        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m; m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
        vec3 g;
        g.x  = a0.x  * x0.x  + h.x  * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
      }

      void main() {
        // Дисплейсмент через шум
        float noise = snoise(v_uv * 3.0 + u_time * 0.3);
        vec2 displacement = vec2(noise, snoise(v_uv.yx * 3.0 + u_time * 0.5)) * 0.02 * (1.0 - abs(u_progress - 0.5) * 2.0);
        
        vec2 uv1 = v_uv + displacement;
        vec2 uv2 = v_uv - displacement;
        
        vec4 c1 = texture2D(u_img1, uv1);
        vec4 c2 = texture2D(u_img2, uv2);
        
        // Плавное смешивание с усилением в середине перехода
        float ease = u_progress < 0.5 
          ? 2.0 * u_progress * u_progress 
          : 1.0 - pow(-2.0 * u_progress + 2.0, 2.0) * 0.5;
        
        vec3 color = mix(c1.rgb, c2.rgb, ease);
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    // ========== WEBGL SETUP ==========
    const canvas = document.getElementById('morphCanvas');
    const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
    if (!gl) { alert('WebGL not supported'); }

    function createShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }
      return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, createShader(gl.VERTEX_SHADER, vsSource));
    gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fsSource));
    gl.linkProgram(program);
    gl.useProgram(program);

    // Буфер вершин (полноэкранный квад)
    const positions = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    const posBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(program, 'a_position');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    // Юниформы
    const uImg1 = gl.getUniformLocation(program, 'u_img1');
    const uImg2 = gl.getUniformLocation(program, 'u_img2');
    const uNoise = gl.getUniformLocation(program, 'u_noise');
    const uProgress = gl.getUniformLocation(program, 'u_progress');
    const uTime = gl.getUniformLocation(program, 'u_time');
    const uResolution = gl.getUniformLocation(program, 'u_resolution');

    // Текстуры
    function createTexture(url, callback) {
      const tex = gl.createTexture();
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        callback(tex);
      };
      img.src = url;
    }

    // Генерация процедурного шума для дисплейсмента
    function generateNoiseTexture() {
      const size = 256;
      const data = new Uint8Array(size * size * 4);
      for (let i = 0; i < size * size; i++) {
        const v = Math.random() * 255;
        data[i*4] = data[i*4+1] = data[i*4+2] = v;
        data[i*4+3] = 255;
      }
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      return tex;
    }

    const noiseTex = generateNoiseTexture();
    let tex1, tex2;
    let imagesLoaded = 0;

    // Картинки-заглушки (можно заменить на свои URL)
    const IMG1 = 'https://picsum.photos/seed/morph1/1920/1080';
    const IMG2 = 'https://picsum.photos/seed/morph2/1920/1080';

    createTexture(IMG1, t => { tex1 = t; if(++imagesLoaded === 2) start(); });
    createTexture(IMG2, t => { tex2 = t; if(++imagesLoaded === 2) start(); });

    // Resize handler
    function resize() {
      const dpr = Math.min(window.devicePixelRatio, 2);
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform2f(uResolution, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);

    // Анимация
    let progress = 0, direction = 1, autoPlay = true, lastTime = 0;
    const TRANSITION_DURATION = 2.5; // секунды

    function render(time) {
      time *= 0.001;
      if (autoPlay) {
        progress += direction * (time - lastTime) / TRANSITION_DURATION;
        if (progress >= 1) { progress = 1; direction = -1; }
        if (progress <= 0) { progress = 0; direction = 1; }
      }
      lastTime = time;

      gl.clearColor(0,0,0,1);
      gl.clear(gl.COLOR_BUFFER_BIT);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex1 || noiseTex);
      gl.uniform1i(uImg1, 0);

      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, tex2 || noiseTex);
      gl.uniform1i(uImg2, 1);

      gl.activeTexture(gl.TEXTURE2);
      gl.bindTexture(gl.TEXTURE_2D, noiseTex);
      gl.uniform1i(uNoise, 2);

      gl.uniform1f(uProgress, progress);
      gl.uniform1f(uTime, time);

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }

    function start() {
      resize();
      requestAnimationFrame(render);
    }

    // Controls
    const progressBar = document.getElementById('progressBar');
    document.getElementById('prevBtn').onclick = () => {
      progress = Math.max(0, progress - 0.25);
      direction = -1;
    };
    document.getElementById('nextBtn').onclick = () => {
      progress = Math.min(1, progress + 0.25);
      direction = 1;
    };
    const toggleBtn = document.getElementById('toggleBtn');
    toggleBtn.onclick = () => {
      autoPlay = !autoPlay;
      toggleBtn.textContent = autoPlay ? '⏸ Pause' : '▶ Play';
      if (autoPlay) lastTime = performance.now() * 0.001;
    };

    // Update progress bar
    setInterval(() => {
      progressBar.style.width = `${progress * 100}%`;
    }, 50);
  </script>
</body>
</html>
