<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day / Night toggle — test</title>
<style>
  :root {
    /* page */
    --bg:             #ffffff;
    /* container pill */
    --pill-bg:        #ffffff;
    --pill-border:    #e5e8ef;
    --pill-shadow:    0 10px 30px rgba(10, 16, 36, 0.06);
    /* switch track */
    --track:          #ffffff;
    --track-border:   #d6dae4;
    /* thumb */
    --thumb-bg:       #e6e022;          /* ярко-жёлтое солнце */
    --thumb-ring:     #d4ce1e;          /* чуть темнее — тонкая обводка */
    --thumb-glow:     rgba(230, 224, 34, 0.35);
    /* labels */
    --label-dim:      #8a93a6;
    --label-bright:   #0a1024;
  }

  body.dark {
    --bg:             #0a1024;
    --pill-bg:        #0f1830;
    --pill-border:    rgba(255, 255, 255, 0.05);
    --pill-shadow:    0 10px 30px rgba(0, 0, 0, 0.35);
    --track:          #1e63f0;
    --track-border:   transparent;
    --thumb-bg:       #1650dd;          /* синий диск */
    --thumb-ring:     #ffffff;          /* белое кольцо */
    --thumb-glow:     transparent;
    --label-bright:   #ffffff;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--label-bright);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.5s ease, color 0.5s ease;
  }

  /* ---------- Toggle ---------- */

  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    /* верхний/левый/правый padding как был; +4px снизу,
       чтобы под треком был заметный воздух */
    padding: 10px 18px 14px 18px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 999px;
    user-select: none;
    cursor: pointer;
    box-shadow: var(--pill-shadow);
    outline: none;
    transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
  }
  .toggle:focus-visible {
    box-shadow: 0 0 0 3px rgba(30,99,240,0.45), 0 10px 30px rgba(0,0,0,0.18);
  }

  .toggle__label {
    font-size: 15px;
    line-height: 1;                 /* фиксируем line-box, чтобы flex-центр был без .5px */
    font-weight: 500;
    letter-spacing: 0.2px;
    color: var(--label-dim);
    transition: color 0.3s ease;
    display: inline-flex;           /* чтобы height = line-height, без descender-a */
    align-items: center;
  }
  .toggle__label--active { color: var(--label-bright); }

  .toggle__switch {
    position: relative;
    width: 52px;
    height: 28px;
    background: var(--track);
    border: 1px solid var(--track-border);
    border-radius: 999px;
    flex-shrink: 0;
    align-self: center;     /* явная центровка внутри pill */
    transition: background 0.5s ease, border-color 0.5s ease;
  }

  .toggle__thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--thumb-bg);
    overflow: hidden;                   /* обрезаем псевдоэлементы по кругу */
    box-shadow:
      0 0 0 1.5px var(--thumb-ring),    /* обводка вокруг thumb */
      0 0 10px 2px var(--thumb-glow);   /* сияние (только в Light) */
    transition:
      left 0.45s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.45s ease,
      box-shadow 0.45s ease;
  }

  /* Белый диск "полной луны" — появляется в Dark */
  .toggle__thumb::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #ffffff;
    transform: scale(0);
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* "Откусывающий" круг цвета thumb — выедает луну до серпа */
  .toggle__thumb::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    left: -38%;
    top: 0;                 /* без вертикального сдвига → серп без наклона */
    border-radius: 50%;
    background: var(--thumb-bg);
    transform: scale(0);
    transition:
      transform 0.45s cubic-bezier(0.4, 0, 0.2, 1) 0.05s,
      background 0.45s ease;
  }

  /* "ON" = Dark: сдвигаем thumb и показываем серп */
  .toggle.is-on .toggle__thumb { left: 27px; }
  .toggle.is-on .toggle__thumb::before,
  .toggle.is-on .toggle__thumb::after { transform: scale(1); }

  /* ---------- Вспомогательный контент под тумблером ---------- */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .hint {
    font-size: 13px;
    opacity: 0.55;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="toggle" id="toggle" role="switch" aria-checked="false" tabindex="0" aria-label="Переключить тему">
      <span class="toggle__label toggle__label--active" id="lblLight">Light</span>
      <div class="toggle__switch">
        <div class="toggle__thumb"></div>
      </div>
      <span class="toggle__label" id="lblDark">Dark</span>
    </div>
    <div class="hint">клик / Space / Enter</div>
  </div>

  <script>
    const toggle   = document.getElementById('toggle');
    const lblLight = document.getElementById('lblLight');
    const lblDark  = document.getElementById('lblDark');

    function setOn(on) {
      toggle.classList.toggle('is-on', on);
      document.body.classList.toggle('dark', on);
      lblLight.classList.toggle('toggle__label--active', !on);
      lblDark .classList.toggle('toggle__label--active',  on);
      toggle.setAttribute('aria-checked', String(on));
    }

    toggle.addEventListener('click', () => {
      setOn(!toggle.classList.contains('is-on'));
    });

    toggle.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        setOn(!toggle.classList.contains('is-on'));
      }
    });
  </script>
</body>
</html>
