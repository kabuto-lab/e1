<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Sandbox - Test & Develop</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #141414;
            --gold-primary: #D4AF37;
            --gold-light: #F4DF89;
            --text-main: #FFFFFF;
            --text-muted: #666666;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .sandbox-header {
            max-width: 1400px;
            margin: 0 auto 40px;
            text-align: center;
        }

        .sandbox-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sandbox-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .test-section {
            max-width: 1400px;
            margin: 0 auto 60px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
        }

        .test-section h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--gold-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .test-section h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--gold-primary);
            border-radius: 2px;
        }

        /* ===== SLIDER CONTAINER ===== */
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        /* ===== SLIDER VERSION 1: Basic Fade ===== */
        .slider-v1 {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
        }

        .slide-v1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .slide-v1.active {
            opacity: 1;
        }

        .slide-v1 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== SLIDER VERSION 2: Horizontal Scroll ===== */
        .slider-v2 {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            padding-bottom: 20px;
        }

        .slider-v2::-webkit-scrollbar {
            display: none;
        }

        .slide-v2 {
            flex: 0 0 300px;
            scroll-snap-align: center;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .slide-v2:hover {
            border-color: var(--gold-primary);
            transform: scale(1.02);
        }

        .slide-v2 img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        /* ===== SLIDER VERSION 3: 3D Cover Flow ===== */
        .slider-v3-container {
            position: relative;
            width: 100%;
            height: 500px;
            perspective: 1000px;
        }

        .slider-v3 {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .slide-v3 {
            position: absolute;
            width: 280px;
            height: 400px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slide-v3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-v3.prev {
            transform: translate(-150%, -50%) rotateY(25deg) scale(0.85);
            opacity: 0.6;
            z-index: 1;
        }

        .slide-v3.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            z-index: 2;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3);
            border: 2px solid var(--gold-primary);
        }

        .slide-v3.next {
            transform: translate(50%, -50%) rotateY(-25deg) scale(0.85);
            opacity: 0.6;
            z-index: 1;
        }

        /* ===== SLIDER VERSION 4: Thumbnail Navigation ===== */
        .slider-v4 {
            position: relative;
        }

        .slider-v4-main {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .slider-v4-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .slider-v4-thumbs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 4px;
        }

        .slider-v4-thumbs::-webkit-scrollbar {
            display: none;
        }

        .thumb-v4 {
            flex: 0 0 100px;
            height: 70px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            opacity: 0.6;
        }

        .thumb-v4:hover {
            opacity: 1;
        }

        .thumb-v4.active {
            border-color: var(--gold-primary);
            opacity: 1;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .thumb-v4 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== SLIDER VERSION 5: Vertical Stack ===== */
        .slider-v5-container {
            position: relative;
            width: 100%;
            height: 500px;
        }

        .slide-v5 {
            position: absolute;
            width: 100%;
            height: 350px;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slide-v5 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-v5:nth-child(1) {
            transform: translateY(0) scale(1);
            z-index: 5;
            opacity: 1;
        }

        .slide-v5:nth-child(2) {
            transform: translateY(-80px) scale(0.9);
            z-index: 4;
            opacity: 0.8;
        }

        .slide-v5:nth-child(3) {
            transform: translateY(-160px) scale(0.8);
            z-index: 3;
            opacity: 0.6;
        }

        .slide-v5:nth-child(4) {
            transform: translateY(-240px) scale(0.7);
            z-index: 2;
            opacity: 0.4;
        }

        .slide-v5:nth-child(5) {
            transform: translateY(-320px) scale(0.6);
            z-index: 1;
            opacity: 0.2;
        }

        /* ===== CONTROLS ===== */
        .slider-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .control-btn:hover {
            border-color: var(--gold-primary);
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.1);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: 0.2s;
        }

        .control-btn:hover svg {
            fill: var(--gold-primary);
        }

        .dots-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-color);
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active {
            background: var(--gold-primary);
            width: 30px;
            border-radius: 5px;
        }

        .dot:hover:not(.active) {
            background: var(--gold-primary);
            opacity: 0.7;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
        }

        .progress-fill {
            height: 100%;
            background: var(--gold-primary);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Test images */
        .test-images {
            display: none;
        }
    </style>
</head>
<body>

    <div class="sandbox-header">
        <h1>🎨 Slider Sandbox</h1>
        <p>Test & develop slider components - Experiment with different styles</p>
    </div>

    <!-- SLIDER V1: Basic Fade -->
    <div class="test-section">
        <h2>Version 1: Basic Fade Slider</h2>
        <div class="slider-v1" id="slider1">
            <div class="slide-v1 active">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Slide 1">
            </div>
            <div class="slide-v1">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/10c9ca6eb-fc59-4317-a2aa-93b6be712abb.png" alt="Slide 2">
            </div>
            <div class="slide-v1">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1d96461f5-9c27-4fd1-8f99-61644dfe6260.png" alt="Slide 3">
            </div>
            <div class="slide-v1">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1e6888abd-f90e-47e3-a2d9-ab6fba972754.png" alt="Slide 4">
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress1"></div>
            </div>
        </div>
        <div class="slider-controls">
            <div class="control-btn" onclick="slider1Prev()">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </div>
            <div class="control-btn" onclick="slider1Next()">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>
    </div>

    <!-- SLIDER V2: Horizontal Scroll -->
    <div class="test-section">
        <h2>Version 2: Horizontal Scroll (Snap)</h2>
        <div class="slider-v2">
            <div class="slide-v2">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Slide 1">
            </div>
            <div class="slide-v2">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/10c9ca6eb-fc59-4317-a2aa-93b6be712abb.png" alt="Slide 2">
            </div>
            <div class="slide-v2">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1d96461f5-9c27-4fd1-8f99-61644dfe6260.png" alt="Slide 3">
            </div>
            <div class="slide-v2">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1e6888abd-f90e-47e3-a2d9-ab6fba972754.png" alt="Slide 4">
            </div>
            <div class="slide-v2">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Slide 5">
            </div>
        </div>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 12px; text-align: center;">
            ← Scroll horizontally →
        </p>
    </div>

    <!-- SLIDER V3: 3D Cover Flow -->
    <div class="test-section">
        <h2>Version 3: 3D Cover Flow</h2>
        <div class="slider-v3-container">
            <div class="slider-v3" id="slider3">
                <div class="slide-v3 active" data-index="0">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Slide 1">
                </div>
                <div class="slide-v3 next" data-index="1">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/10c9ca6eb-fc59-4317-a2aa-93b6be712abb.png" alt="Slide 2">
                </div>
                <div class="slide-v3" data-index="2">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1d96461f5-9c27-4fd1-8f99-61644dfe6260.png" alt="Slide 3">
                </div>
                <div class="slide-v3" data-index="3">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1e6888abd-f90e-47e3-a2d9-ab6fba972754.png" alt="Slide 4">
                </div>
            </div>
        </div>
        <div class="slider-controls">
            <div class="control-btn" onclick="slider3Prev()">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </div>
            <div class="control-btn" onclick="slider3Next()">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>
    </div>

    <!-- SLIDER V4: Thumbnail Navigation -->
    <div class="test-section">
        <h2>Version 4: Thumbnail Navigation</h2>
        <div class="slider-v4">
            <div class="slider-v4-main">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Main" id="v4MainImage">
            </div>
            <div class="slider-v4-thumbs">
                <div class="thumb-v4 active" onclick="setV4Image(0)">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Thumb 1">
                </div>
                <div class="thumb-v4" onclick="setV4Image(1)">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/10c9ca6eb-fc59-4317-a2aa-93b6be712abb.png" alt="Thumb 2">
                </div>
                <div class="thumb-v4" onclick="setV4Image(2)">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1d96461f5-9c27-4fd1-8f99-61644dfe6260.png" alt="Thumb 3">
                </div>
                <div class="thumb-v4" onclick="setV4Image(3)">
                    <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1e6888abd-f90e-47e3-a2d9-ab6fba972754.png" alt="Thumb 4">
                </div>
            </div>
        </div>
    </div>

    <!-- SLIDER V5: Vertical Stack -->
    <div class="test-section">
        <h2>Version 5: Vertical Stack</h2>
        <div class="slider-v5-container">
            <div class="slide-v5" onclick="cycleV5()">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Slide 1">
            </div>
            <div class="slide-v5" onclick="cycleV5()">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/10c9ca6eb-fc59-4317-a2aa-93b6be712abb.png" alt="Slide 2">
            </div>
            <div class="slide-v5" onclick="cycleV5()">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1d96461f5-9c27-4fd1-8f99-61644dfe6260.png" alt="Slide 3">
            </div>
            <div class="slide-v5" onclick="cycleV5()">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1e6888abd-f90e-47e3-a2d9-ab6fba972754.png" alt="Slide 4">
            </div>
            <div class="slide-v5" onclick="cycleV5()">
                <img src="https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png" alt="Slide 5">
            </div>
        </div>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 12px; text-align: center;">
            Click to cycle through slides
        </p>
    </div>

    <script>
        // ===== SLIDER V1: Basic Fade =====
        let currentSlide1 = 0;
        const slides1 = document.querySelectorAll('.slide-v1');
        const progress1 = document.getElementById('progress1');
        let autoPlay1;
        let progressInterval;

        function showSlide1(index) {
            slides1.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) slide.classList.add('active');
            });
        }

        function slider1Next() {
            currentSlide1 = (currentSlide1 + 1) % slides1.length;
            showSlide1(currentSlide1);
            resetProgress1();
        }

        function slider1Prev() {
            currentSlide1 = (currentSlide1 - 1 + slides1.length) % slides1.length;
            showSlide1(currentSlide1);
            resetProgress1();
        }

        function resetProgress1() {
            clearInterval(progressInterval);
            progress1.style.width = '0%';
            setTimeout(() => {
                progress1.style.width = '100%';
            }, 10);
            progressInterval = setInterval(() => {
                const currentWidth = parseFloat(progress1.style.width) || 0;
                if (currentWidth >= 100) {
                    slider1Next();
                }
            }, 30);
        }

        // Auto-play
        function startAutoPlay1() {
            resetProgress1();
            autoPlay1 = setInterval(slider1Next, 3000);
        }

        startAutoPlay1();

        // ===== SLIDER V3: 3D Cover Flow =====
        let currentSlide3 = 0;
        const slides3 = document.querySelectorAll('.slide-v3');

        function updateSlider3() {
            slides3.forEach((slide, index) => {
                slide.classList.remove('prev', 'active', 'next');
                
                if (index === currentSlide3) {
                    slide.classList.add('active');
                } else if (index === (currentSlide3 - 1 + slides3.length) % slides3.length) {
                    slide.classList.add('prev');
                } else if (index === (currentSlide3 + 1) % slides3.length) {
                    slide.classList.add('next');
                }
            });
        }

        function slider3Next() {
            currentSlide3 = (currentSlide3 + 1) % slides3.length;
            updateSlider3();
        }

        function slider3Prev() {
            currentSlide3 = (currentSlide3 - 1 + slides3.length) % slides3.length;
            updateSlider3();
        }

        // ===== SLIDER V4: Thumbnail Navigation =====
        const v4Images = [
            'https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/181ffcc8c-c141-4cf1-ba33-7f37500607cc.png',
            'https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/10c9ca6eb-fc59-4317-a2aa-93b6be712abb.png',
            'https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1d96461f5-9c27-4fd1-8f99-61644dfe6260.png',
            'https://image.qwenlm.ai/public_source/f27c28f1-2ac8-4022-acdd-cb45e9ae696c/1e6888abd-f90e-47e3-a2d9-ab6fba972754.png'
        ];

        function setV4Image(index) {
            document.getElementById('v4MainImage').src = v4Images[index];
            document.querySelectorAll('.thumb-v4').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        }

        // ===== SLIDER V5: Vertical Stack =====
        let v5Index = 0;

        function cycleV5() {
            const container = document.querySelector('.slider-v5-container');
            const slides = Array.from(container.querySelectorAll('.slide-v5'));
            
            // Move first slide to end
            container.appendChild(slides[0]);
            
            // Force reflow
            void container.offsetWidth;
        }

        // Keyboard navigation for V3
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') slider3Prev();
            if (e.key === 'ArrowRight') slider3Next();
        });
    </script>

</body>
</html>
